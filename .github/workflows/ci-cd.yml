name: CI/CD

on:
  push:
    branches: [ main ]
  workflow_dispatch: {} # Activates the manual "Run workflow" button in GitHub

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Forces your GitHub username to lowercase to prevent Docker build crashes
      - name: Convert repository owner to lowercase
        id: repo_owner
        run: echo "owner=${OWNER,,}" >> $GITHUB_OUTPUT
        env:
          OWNER: ${{ github.repository_owner }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ghcr.io/${{ steps.repo_owner.outputs.owner }}/exy:latest

  deploy-to-vps:
    needs: build-and-push
    runs-on: ubuntu-latest
    # Allows deployment on push to main OR via manual clicking (workflow_dispatch)
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Convert repository owner to lowercase for VPS
        id: repo_owner
        run: echo "owner=${OWNER,,}" >> $GITHUB_OUTPUT
        env:
          OWNER: ${{ github.repository_owner }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # Authenticate the VPS with the GitHub Container Registry
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Navigate to your custom workspace directory
            cd /opt/exy-workspace 
            
            # Pull the fresh image and restart containers
            docker compose pull
            docker compose up -d --remove-orphans
            
            # Clean up dangling images to keep your 4GB VPS disk clear
            docker image prune -f